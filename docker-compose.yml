version: "3.9"
services:
  vllm-asr:
    image: vllm/vllm-openai:latest
    pull_policy: never
    gpus: all
    ports:
      - "8001:8001"
    volumes:
      - /models/Qwen3-ASR-0.6B:/models/Qwen3-ASR-0.6B:ro
    command: ["--model", "/models/Qwen3-ASR-0.6B", "--task", "audio", "--port", "8001"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8001)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - appnet

  ollama:
    image: ollama/ollama:latest
    pull_policy: never
    gpus: all
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
    volumes:
      - ollama_data:/var/lib/ollama
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',11434)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - appnet

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ASR_URL: http://vllm-asr:8001/v1/audio/transcriptions
      LLM_URL: http://ollama:11434/v1/chat/completions
      DATABASE_URL: sqlite:///data/meetings/meeting_notes.db
    volumes:
      - ./data/meetings:/data/meetings
    depends_on:
      vllm-asr:
        condition: service_started
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)\" >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('net');const s=new net.Socket();s.setTimeout(2000);s.on('connect',()=>process.exit(0)).on('error',()=>process.exit(1)).connect(3000,'127.0.0.1');\""]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - appnet

volumes:
  ollama_data:
    driver: local

networks:
  appnet:
    driver: bridge
    internal: true
